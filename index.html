<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Paintest is a free, anonymous 10-question self-check for exploring whether a pain pattern may be neuroplastic."
  >
  <meta name="theme-color" content="#f3eee8">
  <title>Paintest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="quiz-panel" aria-labelledby="quiz-title">
      <header class="quiz-header">
        <div class="brand-block">
          <p class="brand-mark">Paintest</p>
          <h1 id="quiz-title">10-question self-check</h1>
        </div>
        <button class="ghost-button" id="restartButton" type="button">Restart</button>
      </header>

      <div class="progress-meta" aria-label="Question progress">
        <span class="progress-label" id="progressText">Question 1 of 10</span>
        <span class="progress-note">Anonymous. Informational only.</span>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="quiz-stage" id="quizStage" aria-live="polite" aria-atomic="true">
        <noscript>
          <article class="stage-card">
            <p class="question-tag">JavaScript required</p>
            <h2 class="question-title">This questionnaire needs JavaScript enabled.</h2>
            <p class="question-copy">
              Paintest calculates your score in the browser, so the test appears once JavaScript
              is available.
            </p>
          </article>
        </noscript>
      </div>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
