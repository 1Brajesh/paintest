<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Paintest is a free, anonymous 10-question self-check for exploring whether a pain pattern may be neuroplastic."
  >
  <meta name="theme-color" content="#f3eee8">
  <title>Paintest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css?v=20260403-7">
</head>
<body>
  <main class="app-shell">
    <section class="quiz-panel" aria-label="Paintest questionnaire">
      <div class="quiz-stage" id="quizStage" aria-live="polite" aria-atomic="true">
        <noscript>
          <article class="stage-card">
            <p class="question-tag">JavaScript required</p>
            <h2 class="question-title">This questionnaire needs JavaScript enabled.</h2>
            <p class="question-copy">
              Paintest calculates your score in the browser, so the test appears once JavaScript
              is available.
            </p>
          </article>
        </noscript>
      </div>
    </section>
  </main>

  <script src="script.js?v=20260403-4" defer></script>
</body>
</html>
